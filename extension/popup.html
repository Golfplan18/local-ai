<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      color: #fff;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #16213e;
      border-radius: 6px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #4CAF50; box-shadow: 0 0 6px #4CAF50; }
    .dot.disconnected { background: #666; }
    .status-text { font-size: 13px; }
    button {
      background: #2d2d4a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 12px;
      width: 100%;
      margin-top: 10px;
    }
    button:hover { background: #3d3d5a; }
    .info {
      color: #777;
      font-size: 11px;
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Ora Browser Bridge</h1>
  </div>
  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Checking...</span>
  </div>
  <button id="reconnect">Reconnect</button>
  <div class="info">
    Connects your AI subscriptions to the Ora orchestrator.
    Stay logged into your AI services in Chrome — Ora will use
    those sessions for browser-based evaluations.
  </div>
  <script src="popup.js"></script>
</body>
</html>
