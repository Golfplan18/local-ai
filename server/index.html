<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local AI</title>
<link id="theme-link" rel="stylesheet" href="/api/theme">
<style>
/* ── Shell styles (structure only — colors from theme CSS variables) ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-family, -apple-system, sans-serif);
  font-size: var(--font-size-base, 15px);
  background: var(--bg-app, #f5f5f0);
  color: var(--text-primary, #1a1a1a);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
#app-header {
  background: var(--bg-header, #1a1a1a);
  color: var(--text-header, #f5f5f0);
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  gap: 12px;
  min-height: 48px;
}
#app-header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
.header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* Layout preset icons */
.preset-icons { display: flex; gap: 4px; }
.preset-icon {
  background: none; border: 1px solid #444; color: #aaa;
  border-radius: 4px; padding: 3px 7px; cursor: pointer;
  font-size: 13px; line-height: 1; transition: all 0.15s;
}
.preset-icon:hover, .preset-icon.active { border-color: #aaa; color: var(--text-header, #f5f5f0); }

/* Theme selector */
#theme-select {
  background: #333; color: #ccc; border: 1px solid #444;
  border-radius: 4px; padding: 3px 6px; font-size: 12px; cursor: pointer;
}

/* Model switcher button */
#switcher-btn {
  background: none; border: 1px solid #444; border-radius: 6px;
  color: #aaa; padding: 4px 9px; cursor: pointer; font-size: 15px;
  transition: all 0.15s;
}
#switcher-btn:hover { border-color: #888; color: var(--text-header, #f5f5f0); }

/* Layout button */
#layout-gen-btn {
  background: none; border: 1px solid #444; border-radius: 6px;
  color: #aaa; padding: 4px 9px; cursor: pointer; font-size: 12px;
  transition: all 0.15s;
}
#layout-gen-btn:hover { border-color: #888; color: var(--text-header, #f5f5f0); }

/* Workspace — panels rendered here */
#workspace {
  display: grid;
  flex: 1;
  overflow: hidden;
  gap: var(--panel-gap, 1px);
  background: var(--border-panel, #e0e0e0);
}

/* Panel structure */
.panel-wrapper {
  background: var(--bg-panel, #fff);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.panel-header {
  background: var(--bg-panel-header, #f0f0eb);
  color: var(--text-panel-header, #444);
  padding: 6px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  font-size: var(--font-size-sm, 13px);
  border-bottom: 1px solid var(--border-panel, #e0e0e0);
  gap: 8px;
}
.panel-label { font-weight: 600; font-size: var(--font-size-sm, 13px); }
.panel-controls { display: flex; align-items: center; gap: 6px; }
.panel-type-select {
  font-size: 11px; background: none; border: 1px solid var(--border, #e0e0e0);
  border-radius: 3px; padding: 2px 4px; color: var(--text-panel-header, #444);
  cursor: pointer;
}
.panel-close-btn {
  background: none; border: none; color: var(--text-muted, #999);
  cursor: pointer; font-size: 14px; padding: 1px 4px; line-height: 1;
}
.panel-close-btn:hover { color: var(--text-primary, #1a1a1a); }
.bridge-toggle {
  font-size: 10px; padding: 2px 5px; border-radius: 3px; cursor: pointer;
  border: 1px solid var(--border, #e0e0e0); background: none;
  color: var(--text-muted, #999); white-space: nowrap;
}
.bridge-toggle.active { color: #4a9a4a; border-color: #4a9a4a; }
.panel-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Chat panel body */
.panel-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.panel-input-row {
  padding: 10px 12px;
  background: var(--bg-input, #fff);
  border-top: 1px solid var(--border, #e0e0e0);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.panel-input {
  flex: 1;
  border: 1px solid var(--border-input, #d0d0d0);
  border-radius: var(--border-radius, 8px);
  padding: 8px 10px;
  font-size: var(--font-size-base, 15px);
  font-family: inherit;
  resize: none;
  outline: none;
  background: var(--bg-input, #fff);
  color: var(--text-primary, #1a1a1a);
  min-height: 38px;
  max-height: 120px;
  overflow-y: auto;
  line-height: 1.4;
}
.panel-input:focus { border-color: var(--accent, #1a1a1a); }
.panel-send {
  background: var(--accent, #1a1a1a);
  color: var(--text-header, #f5f5f0);
  border: none;
  border-radius: var(--border-radius, 8px);
  padding: 8px 14px;
  font-size: var(--font-size-base, 15px);
  cursor: pointer;
  white-space: nowrap;
}
.panel-send:disabled { background: var(--accent-muted, #999); cursor: default; }
.panel-send:hover:not(:disabled) { background: var(--accent-soft, #333); }

/* Chat messages */
.msg { max-width: 100%; }
.bubble {
  padding: 9px 12px;
  border-radius: var(--border-radius, 8px);
  line-height: 1.55;
  font-size: var(--font-size-base, 15px);
  white-space: pre-wrap;
  word-break: break-word;
  display: inline-block;
  max-width: 100%;
}
.msg.user { text-align: right; }
.msg.user .bubble {
  background: var(--bg-user-bubble, #1a1a1a);
  color: var(--text-user-bubble, #f5f5f0);
  border-bottom-right-radius: 3px;
}
.msg.ai .bubble {
  background: var(--bg-ai-bubble, #fff);
  border: 1px solid var(--border, #e0e0e0);
  color: var(--text-ai-bubble, #1a1a1a);
  border-bottom-left-radius: 3px;
}
.tool-status {
  font-size: var(--font-size-xs, 11px);
  color: var(--text-muted, #999);
  font-style: italic;
  padding: 2px 4px;
}
.tool-result {
  font-size: var(--font-size-xs, 11px);
  color: var(--text-secondary, #666);
  background: var(--bg-tool, #f0f0eb);
  border-left: 3px solid var(--border, #ccc);
  padding: 4px 8px;
  border-radius: var(--border-radius-sm, 4px);
  white-space: pre-wrap;
  font-family: var(--font-mono, monospace);
}
.empty-state {
  text-align: center;
  color: var(--text-muted, #999);
  margin: auto;
  font-size: var(--font-size-sm, 13px);
  line-height: 1.8;
  padding: 24px;
}
.bridge-indicator {
  font-size: var(--font-size-xs, 11px);
  color: var(--text-muted, #999);
  padding: 4px 12px;
  background: var(--bg-panel-header, #f0f0eb);
  border-bottom: 1px solid var(--border, #e0e0e0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

/* Send to Main */
.send-to-main-btn {
  display: block; margin-top: 4px;
  font-size: var(--font-size-xs, 11px);
  color: var(--text-link, #2a5db0);
  background: none; border: none; cursor: pointer; padding: 2px 0;
}
.send-to-main-btn:hover { text-decoration: underline; }

/* Vault panel */
.vault-search-row {
  padding: 8px 10px;
  display: flex; gap: 6px;
  border-bottom: 1px solid var(--border, #e0e0e0);
  flex-shrink: 0;
}
.vault-search-input {
  flex: 1; border: 1px solid var(--border-input, #d0d0d0);
  border-radius: var(--border-radius-sm, 4px);
  padding: 5px 8px; font-size: var(--font-size-sm, 13px);
  background: var(--bg-input, #fff); color: var(--text-primary, #1a1a1a);
  outline: none;
}
.vault-search-input:focus { border-color: var(--accent, #1a1a1a); }
.vault-search-btn {
  border: 1px solid var(--border-input, #d0d0d0);
  border-radius: var(--border-radius-sm, 4px);
  background: none; color: var(--text-secondary, #666);
  padding: 5px 10px; cursor: pointer; font-size: 14px;
}
.vault-results {
  flex: 1; overflow-y: auto; padding: 8px 10px;
  display: flex; flex-direction: column; gap: 8px;
}
.vault-note {
  border: 1px solid var(--border, #e0e0e0);
  border-radius: var(--border-radius-sm, 4px);
  padding: 8px 10px;
  background: var(--bg-panel, #fff);
}
.vault-note-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.vault-note-title { font-weight: 600; font-size: var(--font-size-sm, 13px); }
.vault-note-score { font-size: var(--font-size-xs, 11px); color: var(--text-muted, #999); }
.vault-note-meta { font-size: var(--font-size-xs, 11px); color: var(--text-muted, #999); margin-bottom: 4px; }
.vault-note-preview { font-size: var(--font-size-sm, 13px); color: var(--text-secondary, #666); line-height: 1.45; }
.vault-empty, .vault-loading, .vault-error { text-align: center; color: var(--text-muted, #999); padding: 20px; font-size: var(--font-size-sm, 13px); }
.vault-error { color: #c00; }

/* Pipeline panel */
.pipeline-status {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border, #e0e0e0);
  font-size: var(--font-size-sm, 13px);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.pipeline-idle { color: var(--text-muted, #999); }
.pipeline-active { color: #3a9a3a; font-weight: 600; }
.pipeline-stage-name { color: var(--text-primary, #1a1a1a); }
.pipeline-stages { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
.pipeline-stage { border-radius: var(--border-radius-sm, 4px); padding: 7px 10px; border-left: 3px solid var(--border, #e0e0e0); }
.stage-pending { opacity: 0.5; }
.stage-active  { border-left-color: #4a9a4a; background: var(--bg-tool, #f0f0eb); }
.stage-done    { border-left-color: #888; }
.stage-error   { border-left-color: #c00; }
.stage-header  { display: flex; align-items: center; gap: 8px; font-size: var(--font-size-sm, 13px); }
.stage-icon    { font-size: 12px; width: 14px; }
.stage-label   { font-weight: 500; }
.stage-model   { font-size: var(--font-size-xs, 11px); color: var(--text-muted, #999); margin-left: auto; }
.stage-signal  { font-size: var(--font-size-xs, 11px); padding: 1px 5px; border-radius: 3px; }
.stage-signal.convergence  { background: #d4f5d4; color: #1a6a1a; }
.stage-signal.divergence   { background: #ffd4d4; color: #6a1a1a; }
.stage-output  { margin-top: 5px; }
.stage-output summary { font-size: var(--font-size-xs, 11px); color: var(--text-muted, #999); cursor: pointer; }
.stage-output pre { font-size: var(--font-size-xs, 11px); font-family: var(--font-mono, monospace); white-space: pre-wrap; padding: 5px; margin-top: 3px; background: var(--bg-code, #f8f8f5); border-radius: 3px; }

/* Model switcher embedded panel */
.switcher-panel-body { padding: 10px; overflow-y: auto; flex: 1; }
.sw-ram { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; background: var(--bg-app, #f5f5f0); border-radius: 6px; padding: 8px 10px; margin-bottom: 10px; font-size: var(--font-size-sm, 13px); }
.sw-lbl { display: block; font-size: var(--font-size-xs, 11px); color: var(--text-muted, #999); }
.sw-slot { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border, #e0e0e0); }
.sw-slot-label { font-size: var(--font-size-xs, 11px); font-weight: 600; min-width: 76px; color: var(--text-secondary, #666); text-transform: uppercase; letter-spacing: 0.04em; }
.sw-select { flex: 1; font-size: var(--font-size-sm, 13px); border: 1px solid var(--border-input, #d0d0d0); border-radius: 4px; padding: 4px 6px; background: var(--bg-input, #fff); color: var(--text-primary, #1a1a1a); }
.sw-actions { padding: 10px 0 4px; }
.sw-apply { width: 100%; background: var(--accent, #1a1a1a); color: var(--text-header, #f5f5f0); border: none; border-radius: var(--border-radius, 8px); padding: 8px; font-size: var(--font-size-sm, 13px); cursor: pointer; }
.sw-apply:disabled { background: var(--accent-muted, #999); }

/* Layout generator overlay */
#layout-gen-overlay { position: fixed; inset: 0; background: var(--bg-overlay, rgba(0,0,0,0.45)); z-index: 200; display: none; align-items: center; justify-content: center; }
#layout-gen-overlay.open { display: flex; }
#layout-gen-modal {
  background: var(--bg-panel, #fff);
  border-radius: var(--border-radius, 8px);
  padding: 20px;
  width: min(500px, 92vw);
  display: flex; flex-direction: column; gap: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
#layout-gen-modal h3 { font-size: 15px; }
#layout-gen-modal p  { font-size: var(--font-size-sm, 13px); color: var(--text-secondary, #666); }
#layout-desc { width: 100%; border: 1px solid var(--border-input, #d0d0d0); border-radius: var(--border-radius-sm, 4px); padding: 8px; font-family: inherit; font-size: var(--font-size-sm, 13px); background: var(--bg-input, #fff); color: var(--text-primary, #1a1a1a); resize: vertical; min-height: 80px; }
#layout-image-row { display: flex; align-items: center; gap: 10px; font-size: var(--font-size-sm, 13px); }
#layout-image-input { flex: 1; }
#layout-vision-note { font-size: var(--font-size-xs, 11px); color: var(--text-muted, #999); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn-cancel { border: 1px solid var(--border-input, #d0d0d0); background: none; border-radius: var(--border-radius-sm, 4px); padding: 8px 14px; cursor: pointer; font-size: var(--font-size-sm, 13px); }
.modal-btn-apply  { background: var(--accent, #1a1a1a); color: var(--text-header, #f5f5f0); border: none; border-radius: var(--border-radius-sm, 4px); padding: 8px 14px; cursor: pointer; font-size: var(--font-size-sm, 13px); }
.modal-btn-apply:disabled { background: var(--accent-muted, #999); }
#layout-gen-status { font-size: var(--font-size-sm, 13px); color: var(--text-muted, #999); min-height: 18px; }

/* Model switcher slide-out overlay (from header button) */
#switcher-overlay { position: fixed; inset: 0; background: var(--bg-overlay, rgba(0,0,0,0.45)); z-index: 100; display: none; }
#switcher-overlay.open { display: block; }
#switcher-panel-overlay {
  position: fixed; top: 0; right: 0; width: 480px; max-width: 100vw; height: 100vh;
  background: var(--bg-panel, #fff); z-index: 101;
  display: flex; flex-direction: column;
  box-shadow: -4px 0 24px rgba(0,0,0,0.18);
  transform: translateX(100%); transition: transform 0.22s ease;
}
#switcher-panel-overlay.open { transform: translateX(0); }
/* (full switcher markup injected by JS) */

/* Clarification modal */
#clarification-overlay {
  position: fixed; inset: 0;
  background: var(--bg-overlay, rgba(0,0,0,0.45));
  z-index: 180; display: none;
  align-items: center; justify-content: center;
}
#clarification-overlay.open { display: flex; }
#clarification-modal {
  background: var(--bg-panel, #fff);
  border-radius: var(--border-radius, 8px);
  padding: 24px;
  width: min(620px, 92vw);
  max-height: 80vh;
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
#clarification-modal h3 { font-size: 16px; font-weight: 600; }
#clarification-tier-badge {
  display: inline-block;
  font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 3px;
  background: var(--accent-soft, #e8e8e0);
  color: var(--text-secondary, #666);
  letter-spacing: 0.02em;
}
#clarification-questions {
  overflow-y: auto;
  font-size: var(--font-size-base, 15px);
  line-height: 1.65;
  color: var(--text-primary, #1a1a1a);
  padding: 14px;
  background: var(--bg-app, #f5f5f0);
  border-radius: var(--border-radius-sm, 4px);
  border: 1px solid var(--border, #e0e0e0);
  max-height: 30vh;
}
#clarification-answers {
  width: 100%;
  border: 1px solid var(--border-input, #d0d0d0);
  border-radius: var(--border-radius-sm, 4px);
  padding: 10px;
  font-family: inherit;
  font-size: var(--font-size-base, 15px);
  background: var(--bg-input, #fff);
  color: var(--text-primary, #1a1a1a);
  resize: vertical;
  min-height: 100px;
  line-height: 1.5;
}
#clarification-answers:focus { border-color: var(--accent, #1a1a1a); outline: none; }
#clarification-status {
  font-size: var(--font-size-sm, 13px);
  color: var(--text-muted, #999);
  min-height: 18px;
}
.clarification-summary {
  font-size: var(--font-size-xs, 11px);
  color: var(--text-muted, #999);
  background: var(--bg-tool, #f0f0eb);
  border-left: 3px solid var(--accent-muted, #999);
  padding: 8px 10px;
  border-radius: var(--border-radius-sm, 4px);
  margin: 4px 0;
  line-height: 1.5;
}
.clarification-summary strong { color: var(--text-secondary, #666); }
</style>
</head>
<body>

<header id="app-header">
  <h1>Local AI</h1>
  <div class="header-controls">
    <div class="preset-icons">
      <button class="preset-icon" data-preset="simple"    title="Simple — single panel">⬜</button>
      <button class="preset-icon" data-preset="studio"    title="Studio — main + sidebar">⬛⬜</button>
      <button class="preset-icon" data-preset="workbench" title="Workbench — main + sidebar + vault">⬛⬜⬜</button>
    </div>
    <select id="theme-select" title="Switch theme"></select>
    <button id="layout-gen-btn" title="Generate custom layout from description or image">✦ Layout</button>
    <button id="switcher-btn"   title="Configure models (⌘M)">⚙</button>
  </div>
</header>

<div id="workspace"></div>

<!-- Layout generator modal -->
<div id="layout-gen-overlay">
  <div id="layout-gen-modal">
    <h3>Generate Layout</h3>
    <p>Describe your desired layout in plain language, or upload a screenshot/wireframe.</p>
    <textarea id="layout-desc" placeholder="e.g. Main chat on the left half. Pipeline monitor top right. Small vault panel bottom right."></textarea>
    <div id="layout-image-row">
      <label>Image (optional):</label>
      <input type="file" id="layout-image-input" accept="image/*">
    </div>
    <div id="layout-vision-note"></div>
    <div id="layout-gen-status"></div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" id="layout-gen-cancel">Cancel</button>
      <button class="modal-btn-apply"  id="layout-gen-apply">Generate</button>
    </div>
  </div>
</div>

<!-- Model switcher overlay (from header ⚙ button) -->
<div id="switcher-overlay"></div>
<div id="switcher-panel-overlay">
  <!-- injected by switcher overlay init -->
</div>

<!-- Clarification modal -->
<div id="clarification-overlay">
  <div id="clarification-modal">
    <div style="display:flex;align-items:center;gap:10px;">
      <h3>Clarification Needed</h3>
      <span id="clarification-tier-badge"></span>
    </div>
    <p style="font-size:var(--font-size-sm,13px);color:var(--text-secondary,#666);margin:0;">
      The pipeline has paused to gather more information. Answer the questions below to improve the response, or skip to proceed without clarification.
    </p>
    <div id="clarification-questions"></div>
    <textarea id="clarification-answers" placeholder="Type your answers here…"></textarea>
    <div id="clarification-status"></div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" id="clarification-skip">Skip</button>
      <button class="modal-btn-apply" id="clarification-submit">Submit &amp; Continue</button>
    </div>
  </div>
</div>

<!-- Panel modules -->
<script src="/static/chat-panel.js"></script>
<script src="/static/vault-panel.js"></script>
<script src="/static/pipeline-panel.js"></script>
<script src="/static/clarification-panel.js"></script>
<script src="/static/switcher-panel.js"></script>

<script>
// ── Panel registry ────────────────────────────────────────────────────────────
const PANEL_CLASSES = {
  chat:          ChatPanel,
  vault:         VaultPanel,
  pipeline:      PipelinePanel,
  clarification: ClarificationPanel,
  switcher:      SwitcherPanel,
};
const PANEL_TYPES_LIST = ['chat','vault','pipeline','clarification','switcher'];

// Live panel instances {id: PanelInstance}
window._panels = {};

// ── App state ─────────────────────────────────────────────────────────────────
let _layoutCfg  = null;   // current layout config
let _themeName  = 'default-light';
let _visionAvailable = false;

// ── Bootstrap ────────────────────────────────────────────────────────────────
async function boot() {
  await Promise.all([loadThemeList(), loadLayoutAndRender()]);
  checkVision();
}

async function loadThemeList() {
  try {
    const r = await fetch('/api/themes');
    const d = await r.json();
    const sel = document.getElementById('theme-select');
    sel.innerHTML = '';
    (d.themes || []).sort().forEach(t => {
      const o = document.createElement('option');
      o.value = t;
      o.textContent = t.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      sel.appendChild(o);
    });
    // Detect OS dark mode and set default if no saved theme
    try {
      const lr = await fetch('/api/layout');

function renderLayout(cfg) {
  // Destroy existing panels
  Object.values(window._panels).forEach(p => { try { p.destroy(); } catch(e){} });
  window._panels = {};

  const panels = cfg.layout.panels;
  const ws     = document.getElementById('workspace');

  // Build CSS Grid columns from width_pct
  const cols = panels.map(p => `${p.width_pct || Math.floor(100/panels.length)}fr`).join(' ');
  ws.style.gridTemplateColumns = cols;
  ws.innerHTML = '';

  panels.forEach(pCfg => {
    const wrapper = document.createElement('div');
    wrapper.className = 'panel-wrapper';
    wrapper.id = `panel-wrapper-${pCfg.id}`;

    // Panel header
    const header = document.createElement('div');
    header.className = 'panel-header';

    const label = document.createElement('span');
    label.className = 'panel-label';
    label.textContent = pCfg.label || pCfg.type;

    const controls = document.createElement('div');
    controls.className = 'panel-controls';

    // Type selector
    const typeSel = document.createElement('select');
    typeSel.className = 'panel-type-select';
    typeSel.title = 'Change panel type';
    PANEL_TYPES_LIST.forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      if (t === pCfg.type) o.selected = true;
      typeSel.appendChild(o);
    });
    typeSel.addEventListener('change', () => changePanelType(pCfg.id, typeSel.value));

    // Bridge toggle (for panels that support subscribing)
    const hasSubscribe = ['chat','vault','clarification'].includes(pCfg.type);
    if (hasSubscribe && !pCfg.is_main_feed) {
      const bridgeBtn = document.createElement('button');
      bridgeBtn.className = 'bridge-toggle' + (pCfg.bridge_subscribe_to ? ' active' : '');
      bridgeBtn.textContent = pCfg.bridge_subscribe_to ? '⇢ bridge on' : '⇢ bridge off';
      bridgeBtn.title = 'Toggle bridge subscription to main feed';
      bridgeBtn.addEventListener('click', () => toggleBridge(pCfg.id, bridgeBtn, pCfg));
      controls.appendChild(bridgeBtn);
    }

    controls.appendChild(typeSel);

    // Close button (don't show if only one panel)
    if (panels.length > 1) {
      const closeBtn = document.createElement('button');
      closeBtn.className = 'panel-close-btn';
      closeBtn.textContent = '✕';
      closeBtn.title = 'Close panel';
      closeBtn.addEventListener('click', () => closePanel(pCfg.id));
      controls.appendChild(closeBtn);
    }

    header.appendChild(label);
    header.appendChild(controls);

    const body = document.createElement('div');
    body.className = 'panel-body';
    body.id = `panel-body-${pCfg.id}`;

    wrapper.appendChild(header);
    wrapper.appendChild(body);
    ws.appendChild(wrapper);

    // Instantiate module
    const PanelClass = PANEL_CLASSES[pCfg.type] || ChatPanel;
    const instance   = new PanelClass(body, pCfg);
    instance.init();
    window._panels[pCfg.id] = instance;
  });
}

function changePanelType(panelId, newType) {
  const panels = _layoutCfg.layout.panels;
  const p = panels.find(x => x.id === panelId);
  if (!p) return;
  const old = window._panels[panelId];
  if (old) { try { old.destroy(); } catch(e){} }

  p.type = newType;
  p.label = newType.charAt(0).toUpperCase() + newType.slice(1);

  const body = document.getElementById(`panel-body-${panelId}`);
  body.innerHTML = '';
  const PanelClass = PANEL_CLASSES[newType] || ChatPanel;
  const instance = new PanelClass(body, p);
  instance.init();
  window._panels[panelId] = instance;

  // Persist
  saveLayout();
}

function toggleBridge(panelId, btn, pCfg) {
  const panels = _layoutCfg.layout.panels;
  const p = panels.find(x => x.id === panelId);
  if (!p) return;
  const mainPanel = panels.find(x => x.is_main_feed);
  if (p.bridge_subscribe_to) {
    p.bridge_subscribe_to = null;
    btn.textContent = '⇢ bridge off';
    btn.classList.remove('active');
  } else {
    p.bridge_subscribe_to = mainPanel ? mainPanel.id : 'main';
    btn.textContent = '⇢ bridge on';
    btn.classList.add('active');
  }
  saveLayout();
}

// ── Panel close / (future: split) ────────────────────────────────────────────
function closePanel(panelId) {
  const panels = _layoutCfg.layout.panels;
  if (panels.length <= 1) return;

  const old = window._panels[panelId];
  if (old) { try { old.destroy(); } catch(e){} }
  delete window._panels[panelId];

  const idx   = panels.findIndex(p => p.id === panelId);
  const freed = panels[idx].width_pct || 0;
  panels.splice(idx, 1);

  // Distribute freed width to remaining panels proportionally
  const total = panels.reduce((s,p) => s + (p.width_pct||0), 0);
  if (total > 0) panels.forEach(p => { p.width_pct = Math.round(p.width_pct * 100 / total); });

  _layoutCfg.layout.preset_base = 'custom';
  renderLayout(_layoutCfg);
  saveLayout();
}

async function generateLayout() {
  const desc   = document.getElementById('layout-desc').value.trim();
  const fileEl = document.getElementById('layout-image-input');
  const file   = fileEl.files[0];
  const status = document.getElementById('layout-gen-status');
  const applyBtn = document.getElementById('layout-gen-apply');

  if (!desc && !file) { status.textContent = 'Enter a description or upload an image.'; return; }

  applyBtn.disabled = true;
  status.textContent = 'Generating…';

  let image_b64 = null;
  if (file && _visionAvailable) {
    image_b64 = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
  }

  try {
    const r = await fetch('/api/generate-layout', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({description: desc, image: image_b64})
    });
    const data = await r.json();
    if (data.error) { status.textContent = '⚠ ' + data.error; applyBtn.disabled = false; return; }

    const layout = data.layout;
    layout.theme = _themeName;
    _layoutCfg = layout;
    await fetch('/api/layout', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(layout)
    });
    renderLayout(layout);
    document.getElementById('layout-gen-overlay').classList.remove('open');
    document.getElementById('layout-desc').value = '';
    fileEl.value = '';
  } catch(e) {
    status.textContent = '⚠ Request failed: ' + e.message;
  }
  applyBtn.disabled = false;
}

function swBuildIndex() {
  const idx = {};
  (_swData.local_models||[]).forEach(m => idx[m.id] = m);
  (_swData.commercial_models||[]).forEach(m => idx[m.id] = m);
  return idx;
}
function swRamUsed(asgn) {
  const idx = swBuildIndex(); const unique = new Set();
  Object.values(asgn).forEach(id => { const m = idx[id]; if (m && m.ram_gb > 0) unique.add(id); });
  let t = 0; unique.forEach(id => t += idx[id].ram_gb); return t;
}
function swUpdateRam() {
  const used = swRamUsed(_swPending);
  const free = _swData.available_budget_gb - used;
  const usedEl = document.getElementById('sw-ov-used');
  const freeEl = document.getElementById('sw-ov-free');
  if (usedEl) usedEl.textContent = used.toFixed(0) + ' GB';
  if (freeEl) { freeEl.textContent = free.toFixed(0) + ' GB'; freeEl.style.color = free < 0 ? 'var(--accent)' : ''; }
  swUpdateAllImpacts();
}
function swUpdateAllImpacts() {
  const idx = swBuildIndex();
  SW_SLOTS.forEach(slot => {
    const el = document.getElementById(`sw-impact-${slot.id}`);
    if (!el) return;
    const id = _swPending[slot.id]; if (!id) { el.textContent=''; return; }
    const m  = idx[id]; if (!m) { el.textContent=''; return; }
    if (m.ram_gb === 0) { el.textContent = '☁ cloud'; el.style.color = 'var(--text-link,#4a80b0)'; return; }
    const shared = SW_SLOTS.some(s => s.id !== slot.id && _swPending[s.id] === id);
    el.textContent = shared ? `${m.ram_gb} GB (shared — already loaded)` : `+${m.ram_gb} GB`;
    el.style.color = shared ? '#3a9a3a' : 'var(--text-muted)';
  });
}
function swUpdateWarnings() {
  const el = document.getElementById('sw-ov-warn');
  if (!el) return;

}
function swApplyPreset(preset) {
  const local = _swData.local_models || [];
  const comm  = (_swData.commercial_models||[]).filter(m => m.available);
  const dense = local.find(m => m.type==='dense') || local[0];
  const largeMoe = local.filter(m=>m.type==='moe').reduce((a,b)=>a&&a.ram_gb>b.ram_gb?a:b, null) || local[0];
  const small = local.reduce((a,b)=>a.ram_gb<b.ram_gb?a:b, local[0]);
  const byProv = {}; comm.forEach(m => { if (!byProv[m.provider]) byProv[m.provider]=m; });
  const claude=byProv['anthropic'], openai=byProv['openai'], google=byProv['google'], any=claude||openai||google;
  const depth=dense||local[0], breadth=largeMoe||local[0];
  const a = {};
  if (preset==='all-local')       { a.sidebar=small?.id;a.step1_cleanup=breadth?.id;a.breadth=breadth?.id;a.depth=depth?.id;a.evaluator=depth?.id;a.consolidator=breadth?.id; }
  if (preset==='local-cloud-eval'){ a.sidebar=small?.id;a.step1_cleanup=breadth?.id;a.breadth=breadth?.id;a.depth=depth?.id;a.evaluator=any?.id;a.consolidator=breadth?.id; }
  if (preset==='all-cloud')       { a.sidebar=small?.id;a.step1_cleanup=claude?.id||any?.id;a.breadth=openai?.id||any?.id;a.depth=claude?.id||any?.id;a.evaluator=google?.id||any?.id;a.consolidator=claude?.id||any?.id; }
  if (preset==='max-diversity')   { a.sidebar=small?.id;a.step1_cleanup=breadth?.id;a.breadth=openai?.id||any?.id||breadth?.id;a.depth=claude?.id||depth?.id;a.evaluator=google?.id||any?.id||depth?.id;a.consolidator=breadth?.id; }
  Object.entries(a).forEach(([sl,id]) => { if (id) { _swPending[sl]=id; const s=document.getElementById(`sw-slot-${sl}`); if(s) s.value=id; } });
  swUpdateRam(); swUpdateWarnings();
}

  // Focus the answers textarea after transition
  setTimeout(() => document.getElementById('clarification-answers').focus(), 100);
}

function _closeClarificationModal() {
  document.getElementById('clarification-overlay').classList.remove('open');
}

document.getElementById('clarification-submit').addEventListener('click', async () => {
  const answers = document.getElementById('clarification-answers').value.trim();
  if (!answers) {
    document.getElementById('clarification-status').textContent = 'Please type your answers before submitting.';
    return;
  }

  const btn = document.getElementById('clarification-submit');
  btn.disabled = true;
  document.getElementById('clarification-status').textContent = 'Resuming pipeline…';

  const { panelId, aiBubble, userText, panel } = _clarificationState;
  const questions = document.getElementById('clarification-questions').textContent;

  // Inject Q&A summary into the conversation as a muted record
  if (panel && panel._msgs) {
    const summary = document.createElement('div');
    summary.className = 'clarification-summary';
    summary.innerHTML = `<strong>Clarification:</strong> ${answers.replace(/</g,'&lt;').replace(/\n/g, '<br>')}`;
    panel._msgs.appendChild(summary);
    panel._msgs.scrollTop = panel._msgs.scrollHeight;
  }

  _closeClarificationModal();
  await _streamClarificationResponse('/api/clarification', { panel_id: panelId, answers });
});

document.getElementById('clarification-skip').addEventListener('click', async () => {
  const { panelId, aiBubble, panel } = _clarificationState;

  // Note in conversation that clarification was skipped
  if (panel && panel._msgs) {
    const note = document.createElement('div');
    note.className = 'clarification-summary';
    note.innerHTML = '<strong>Clarification skipped</strong> — proceeding with Tier 1 behavior.';
    panel._msgs.appendChild(note);
  }

  _closeClarificationModal();
  await _streamClarificationResponse('/api/clarification/skip', { panel_id: panelId });
});

// Escape key closes the modal (same as skip)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('clarification-overlay').classList.contains('open')) {
    document.getElementById('clarification-skip').click();
  }
});

// Ctrl/Cmd+Enter submits from the textarea
document.getElementById('clarification-answers').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    document.getElementById('clarification-submit').click();
  }
});

async function _streamClarificationResponse(url, body) {
  const { aiBubble, userText, panel } = _clarificationState;
  aiBubble.innerHTML = '<em style="opacity:.5">Resuming…</em>';

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const d = JSON.parse(line.slice(6));
        if (d.type === 'pipeline_stage') {
          if (panel) panel._appendToolStatus(d.label || d.stage);
          aiBubble.innerHTML = '<em style="opacity:.5">…</em>';
        }
        else if (d.type === 'tool_status') {
          if (panel) panel._appendToolStatus(d.text);
          aiBubble.innerHTML = '<em style="opacity:.5">…</em>';
        }
        else if (d.type === 'tool_result') {
          if (panel) panel._appendToolResult(d.name, d.result);
        }
        else if (d.type === 'response') {
          aiBubble.innerHTML = _md(d.text);
          // Push to panel history (user message + final response)
          if (panel) {
            panel.history.push({ role: 'user', content: userText });
            panel.history.push({ role: 'assistant', content: d.text });
          }
        }
        else if (d.type === 'error') {
          aiBubble.textContent = '⚠ ' + d.text;
        }
      }
    }
  } catch (e) {
    aiBubble.textContent = '⚠ Connection error';
  }

  // Re-enable input
  if (panel) {
    panel._send.disabled = false;
    panel._input.focus();
    panel._msgs.scrollTop = panel._msgs.scrollHeight;
  }
  _clarificationState = null;
}

// ── Start ─────────────────────────────────────────────────────────────────────
boot();
</script>
